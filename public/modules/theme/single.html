<div>
  <div v-if="loading">Loading post...</div>
  <div v-else-if="post">
    <h1>{{ post.title }}</h1>
    <p>{{ post.content }}</p>
    <p>
      <router-link to="/">← Back to Home</router-link>
    </p>
  </div>
  <div v-else>
    <h2>Post not found</h2>
    <p>
      <router-link to="/">← Back to Home</router-link>
    </p>
  </div>
</div>
