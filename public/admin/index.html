<!doctype html>
<html>
<head>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  while (true) {
    if (await (await fetch('/api/authorization', { headers: { 'x-api-key': decodeURIComponent(document.cookie.split('; ').find((row) => row.startsWith('__Secure-API_key='))?.split('=')[1] ?? '') } })).json()) break;
    const apiKey = encodeURIComponent(prompt("Enter API key") ?? '');
    document.cookie = `__Secure-API_key=${apiKey}; Domain=paelo.pages.dev; Path=/admin/; SameSite=Strict; Secure`;
  }
});
</script>
</head>
<body>
admin only
</body>
</html>
